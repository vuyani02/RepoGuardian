name: Frontend — Lint & Build

on:
  push:
    branches: [master]
    paths:
      - '9.4.2/angular/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [master]
    paths:
      - '9.4.2/angular/**'
      - '.github/workflows/frontend.yml'

# NOTE: Replace this workflow when Angular is swapped for Next.js.
# For Next.js: replace `npm run lint` with eslint and `ng build` with `next build`.

jobs:
  lint-and-build:
    name: Lint & Build (Angular 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 9.4.2/angular/package-lock.json

      - name: Install dependencies
        working-directory: 9.4.2/angular
        run: npm ci

      - name: Lint
        working-directory: 9.4.2/angular
        run: npm run lint

      - name: Build
        working-directory: 9.4.2/angular
        run: npx ng build --configuration production
