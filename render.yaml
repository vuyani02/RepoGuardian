databases:
  - name: fullstackproject-db
    plan: free
    databaseName: fullstackproject
    user: fullstackproject

services:
  - type: web
    name: fullstackproject-api
    runtime: docker
    dockerfilePath: ./9.4.2/aspnet-core/src/FullStackProject.Web.Host/Dockerfile
    dockerContext: ./9.4.2/aspnet-core
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: Kestrel__Endpoints__Http__Url
        value: http://+:10000
      - key: DATABASE_URL
        fromDatabase:
          name: fullstackproject-db
          property: connectionString
      - key: App__ServerRootAddress
        sync: false
      - key: App__ClientRootAddress
        sync: false
      - key: App__CorsOrigins
        sync: false
      - key: Authentication__JwtBearer__SecurityKey
        generateValue: true
